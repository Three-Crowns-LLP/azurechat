name: PR checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Diagnostics
        run: |
          node --version
          npm --version
          ls -la src
          test -f src/package-lock.json && echo "lockfile present" || echo "lockfile MISSING"

      - name: Install
        working-directory: ./src
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: ./src
        run: npm run lint 2>&1 | tee /tmp/lint.log
        continue-on-error: true

      - name: Typecheck
        working-directory: ./src
        run: npx tsc --noEmit 2>&1 | tee /tmp/typecheck.log
        continue-on-error: true

      # Capture full build output to a log file so we can re-print just
      # the tail on failure. `set -o pipefail` keeps the step failing
      # when next build does.
      - name: Build
        id: build
        working-directory: ./src
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log
        continue-on-error: true

      - name: Re-print lint tail
        if: always() && steps.build.outcome == 'failure'
        run: |
          echo "=================================================="
          echo "Lint output (tail 100 lines)"
          echo "=================================================="
          tail -100 /tmp/lint.log || echo "(no lint log)"

      - name: Re-print typecheck tail
        if: always() && steps.build.outcome == 'failure'
        run: |
          echo "=================================================="
          echo "Typecheck output (tail 100 lines)"
          echo "=================================================="
          tail -100 /tmp/typecheck.log || echo "(no typecheck log)"

      - name: Re-print build tail on failure
        if: always() && steps.build.outcome == 'failure'
        run: |
          echo "=================================================="
          echo "BUILD FAILED — tail 200 lines of build log"
          echo "=================================================="
          tail -200 /tmp/build.log

      - name: Upload full logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-checks-logs
          path: /tmp/*.log
          if-no-files-found: warn

      - name: Fail the job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
