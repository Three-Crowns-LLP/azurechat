name: PR checks

# Runs on every PR targeting main and on direct pushes to main.
# Catches lint / type / build failures before they can land in prod —
# the deploy workflow (open-ai-app.yml) does its own build, but only
# after merge, by which point a broken build is already on main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Diagnostics
        run: |
          node --version
          npm --version
          ls -la src
          test -f src/package-lock.json && echo "lockfile present" || echo "lockfile MISSING"

      - name: Install
        working-directory: ./src
        run: npm ci

      - name: Lint
        working-directory: ./src
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        working-directory: ./src
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        working-directory: ./src
        run: npm run build
